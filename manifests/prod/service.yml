kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: bankapp-prod
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
   - port: 3306
     targetPort: 3306
---

kind: Service
apiVersion: v1
metadata:
  name: bankapp-service
  namespace: bankapp-prod
spec:
  selector:
    app: bankapp
  ports:
   - port: 8080
     targetPort: 8080

  type: NodePort 


