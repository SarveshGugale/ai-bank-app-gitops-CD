apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-deployment
  namespace: bankapp-dev
  labels:
    app: bankapp

spec:
  replicas: 2
  selector:
    matchLabels:
      app: bankapp

  template:
    metadata:
      labels:
        app: bankapp

    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["/bin/sh","-c","until nc -z mysql-service 3306; do sleep 2; done"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      containers:
        - name: bankapp
          image: sarvesh01234/ai-bankapp:b8ef0f6348e00c5fbfd9c3d532521e8b9482e5b6
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: bankapp-configmap
            - secretRef:
                name: bankapp-secrets
