apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bankapp-daemonset
  namespace: bankapp
spec:
  selector:
    matchLabels:
      app: bankapp
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: bankapp
        image: ai-bankapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
