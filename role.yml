kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata: 
  name: bankapp-admin
  namespace: bankapp
rules:
  - apiGroups: ["","apps","autoscaling","rbac.authorization.k8s.io","batch"]
    resources: ["deployments","pods","services","horizontalpodautoscalers","verticalpodautoscalers"]
    verbs: ["get","delete","patch","update","watch","create"]

---

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bankapp-viewer
  namespace: bankapp
rules:
  - apiGroups: ["","apps"] #"autoscaling","rbac.authorization.k8s.io","batch"]
    resources: ["deployments","pods","services","horizontalpodautoscalers","verticalpodautoscalers"]
    verbs: ["get","watch"] #"delete","patch","update","create"]
---

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bankapp-read-write
  namespace: bankapp
rules:
  - apiGroups: ["","apps","autoscaling","rbac.authorization.k8s.io","batch"]
    resources: ["deployments","pods","services","horizontalpodautoscalers","verticalpodautoscalers"]
    verbs: ["get","create","list","patch","update","watch"]





