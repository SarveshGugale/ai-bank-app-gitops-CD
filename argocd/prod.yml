apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-bankapp-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/SarveshGugale/ai-bank-app-gitops-CD.git
    targetRevision: HEAD
    path: manifests/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: bankapp-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
